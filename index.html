<!-- templates/index.html -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Suspicious Activity Detector</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { padding: 24px; background:#f7f9fc; }
    .card { border-radius:12px; box-shadow: 0 6px 18px rgba(35,47,63,0.06); }
    #videoPreview { width:100%; max-height:480px; background:#000; }
  </style>
</head>
<body>
<div class="container">
  <h2 class="mb-3">Suspicious Activity Detection — Upload or Real-time</h2>

  <div class="row">
    <div class="col-md-6">
      <div class="card p-3 mb-3">
        <h5>Upload a Video</h5>
        <input id="fileInput" type="file" accept="video/*" class="form-control my-2"/>
        <button id="uploadBtn" class="btn btn-primary">Upload & Analyze</button>
        <div id="uploadStatus" class="mt-2"></div>
      </div>

      <div class="card p-3">
        <h5>Real-time Detection (Webcam)</h5>
        <button id="startCam" class="btn btn-success">Start Webcam</button>
        <button id="stopCam" class="btn btn-danger">Stop Webcam</button>
        <div class="mt-2">
          <video id="videoPreview" autoplay muted></video>
        </div>
        <div class="mt-2">
          <button id="captureFrame" class="btn btn-outline-secondary">Capture Snapshot</button>
          <div id="liveStatus" class="mt-2"></div>
        </div>
      </div>

    </div>

    <div class="col-md-6">
      <div class="card p-3">
        <h5>Results</h5>
        <div id="resultsArea">
          <p class="text-muted">No results yet.</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const uploadBtn = document.getElementById('uploadBtn');
const fileInput = document.getElementById('fileInput');
const uploadStatus = document.getElementById('uploadStatus');
const resultsArea = document.getElementById('resultsArea');

uploadBtn.onclick = async () => {
  if (!fileInput.files.length) {
    alert('Select a video file first.');
    return;
  }
  const file = fileInput.files[0];
  const form = new FormData();
  form.append('video', file);
  uploadStatus.innerText = 'Uploading & processing... (this may take a while)';
  uploadBtn.disabled = true;
  try {
    const resp = await fetch('/analyze_upload', { method:'POST', body: form });
    const data = await resp.json();
    uploadStatus.innerText = 'Processing complete.';
    renderResults(data);
  } catch (err) {
    uploadStatus.innerText = 'Error: ' + err;
  } finally {
    uploadBtn.disabled = false;
  }
};

function renderResults(data) {
  resultsArea.innerHTML = '';
  if (data.clips && data.clips.length) {
    const ul = document.createElement('div');
    data.clips.forEach((c,i) => {
      const node = document.createElement('div');
      node.innerHTML = `<strong>Clip ${i+1}:</strong> ${c.type} — ${c.start_time}s to ${c.end_time}s
        <div><a href="${c.url}" target="_blank" download>Download clip</a></div>`;
      ul.appendChild(node);
    });
    resultsArea.appendChild(ul);
  }
  if (data.report_url) {
    const a = document.createElement('a');
    a.href = data.report_url; a.innerText = "Download PDF report";
    a.target = "_blank";
    resultsArea.appendChild(a);
  }
  if (data.heatmap_url) {
    const img = document.createElement('img');
    img.src = data.heatmap_url;
    img.style = "width:100%; margin-top:10px; border-radius:8px;";
    resultsArea.appendChild(img);
  }
  if (data.descriptions) {
    const dd = document.createElement('div');
    dd.innerHTML = '<h6 class="mt-3">Descriptions</h6>';
    data.descriptions.forEach(d => {
      const p = document.createElement('p');
      p.innerText = `${d.time}s — ${d.text}`;
      dd.appendChild(p);
    });
    resultsArea.appendChild(dd);
  }
}



/* Minimal webcam code that sends frames to the server for detection */
let stream = null;
const video = document.getElementById('videoPreview');
const startCam = document.getElementById('startCam');
const stopCam = document.getElementById('stopCam');
const captureFrame = document.getElementById('captureFrame');
const liveStatus = document.getElementById('liveStatus');

startCam.onclick = async () => {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video:true, audio:false });
    video.srcObject = stream;
    liveStatus.innerText = 'Webcam started. Sending frames for live detection...';
    sendFramesLoop();
  } catch (e) {
    alert('Could not start webcam: ' + e);
  }
};
stopCam.onclick = () => {
  if (stream) {
    stream.getTracks().forEach(t => t.stop());
    stream = null;
    video.srcObject = null;
    liveStatus.innerText = 'Webcam stopped.';
  }
};

let sending = false;
async function sendFramesLoop() {
  if (!stream) return;
  sending = true;
  const canvas = document.createElement('canvas');
  while (stream) {
    try {
      canvas.width = video.videoWidth || 640;
      canvas.height = video.videoHeight || 480;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.7));
      const form = new FormData();
      form.append('frame', blob, 'frame.jpg');
      // lightweight endpoint returns JSON summary (not video) for live preview
      const res = await fetch('/live_detect', { method:'POST', body: form });
      const j = await res.json();
      // show simplified info
      liveStatus.innerText = `Detected: ${j.summary || 'none'} (fps ~ live)`;
    } catch (err) {
      console.error(err);
    }
    await new Promise(r => setTimeout(r, 500));
  }
  sending = false;
}

captureFrame.onclick = async () => {
  // take a snapshot and ask backend for a single-frame analysis
  if (!video) return;
  const c = document.createElement('canvas');
  c.width = video.videoWidth || 640;
  c.height = video.videoHeight || 480;
  c.getContext('2d').drawImage(video, 0, 0, c.width, c.height);
  const blob = await new Promise(r => c.toBlob(r, 'image/jpeg'));
  const form = new FormData(); form.append('frame', blob, 'snap.jpg');
  const resp = await fetch('/frame_detect', { method:'POST', body:form });
  const data = await resp.json();
  alert('Frame result: ' + (data.summary || 'none'));
};
</script>
</body>
</html>
